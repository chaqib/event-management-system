name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  BACKEND_IMAGE: event-management-backend
  FRONTEND_IMAGE: event-management-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies - Backend
        working-directory: ./backend
        run: npm ci

      - name: Build Backend
        working-directory: ./backend
        run: npm run build

      - name: Lint Backend
        working-directory: ./backend
        continue-on-error: true
        run: npm run lint || true

      - name: Install dependencies - Frontend
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Lint Frontend
        working-directory: ./frontend
        continue-on-error: true
        run: npm run lint || true

      - name: Upload build artifacts - Backend
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist

      - name: Upload build artifacts - Frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  test:
    runs-on: ubuntu-latest
    needs: build
    if: always()

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ems_user
          POSTGRES_PASSWORD: ems_password_2026
          POSTGRES_DB: event_management
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend/dist

      - name: Install dependencies - Backend
        working-directory: ./backend
        run: npm ci

      - name: Run Backend Tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://ems_user:ems_password_2026@localhost:5432/event_management
          NODE_ENV: test
        continue-on-error: true
        run: npm run test || true

      - name: Install dependencies - Frontend
        working-directory: ./frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: ./frontend
        continue-on-error: true
        run: npm run test || true

  push-images:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend/dist

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build and Push Backend Image
        run: |
          az acr build \
            --registry ${{ secrets.AZURE_CONTAINER_REGISTRY }} \
            --image ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --image ${{ env.BACKEND_IMAGE }}:latest \
            --file backend/Dockerfile.prod \
            backend

      - name: Build and Push Frontend Image
        run: |
          az acr build \
            --registry ${{ secrets.AZURE_CONTAINER_REGISTRY }} \
            --image ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --image ${{ env.FRONTEND_IMAGE }}:latest \
            --file frontend/Dockerfile.prod \
            frontend

  deploy:
    runs-on: ubuntu-latest
    needs: push-images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_BACKEND: event-management-backend
          CONTAINER_APP_FRONTEND: event-management-frontend
          REGISTRY_NAME: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
        run: |
          # Update backend container app
          az containerapp update \
            --resource-group $RESOURCE_GROUP \
            --name $CONTAINER_APP_BACKEND \
            --image $REGISTRY_NAME.azurecr.io/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

          # Update frontend container app
          az containerapp update \
            --resource-group $RESOURCE_GROUP \
            --name $CONTAINER_APP_FRONTEND \
            --image $REGISTRY_NAME.azurecr.io/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Verify Deployment
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_BACKEND: event-management-backend
          CONTAINER_APP_FRONTEND: event-management-frontend
        run: |
          # Check backend status
          echo "Backend deployment status:"
          az containerapp show \
            --resource-group $RESOURCE_GROUP \
            --name $CONTAINER_APP_BACKEND \
            --query "{Name:name, Provisioning:properties.provisioningState, Latest:properties.template.containers[0].image}"

          echo "Frontend deployment status:"
          az containerapp show \
            --resource-group $RESOURCE_GROUP \
            --name $CONTAINER_APP_FRONTEND \
            --query "{Name:name, Provisioning:properties.provisioningState, Latest:properties.template.containers[0].image}"
