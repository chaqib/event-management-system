name: event_management_app
description: Event Management System - Mobile App for Attendees
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  http: ^1.2.0
  shared_preferences: ^2.2.2
  go_router: ^13.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  url_launcher: ^6.2.3
  qr_flutter: ^4.1.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  pull_to_refresh: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
